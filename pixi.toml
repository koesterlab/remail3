[workspace]
name = "remail"
version = "0.1.0"
description = "ReMail - Email management with AI-powered features"
authors = ["Your Name <you@example.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tasks]
# 1) Ruff lint + format
format-lint = "ruff check --fix ."
format-code = "ruff format ."
format = { depends-on = ["format-lint", "format-code"] }

# 2) Ruff lint + format check
lint = "ruff check ."
format-code-check = "ruff format --check ."
format-check = { depends-on = ["lint", "format-code-check"] }

# 3) Type checking
typecheck = "mypy remail --explicit-package-bases"

# 4) Dead code detection
deadcode = "vulture remail --exclude remail/frontend,remail/llm,remail/email_api,remail/database,remail/controller.py,remail/util"

# 5) Security scan
security = "bandit -r remail -x remail/frontend,remail/llm,remail/email_api,remail/database,remail/controller.py"

# 6) Tests
test = "pytest --tb=short -v"

[dependencies]
python = ">=3.12"
duckdb = ">=1.1.3"
sqlalchemy = ">=2.0.36"
streamlit = ">=1.40.0"
flet = ">=0.24.1"
keyring = ">=25.6.0"
werkzeug = ">=3.1.3"
transformers = ">=4.46.3"
sentence-transformers = ">=3.3.1"
chromadb = ">=0.5.23"

[pypi-dependencies]
sqlmodel = ">=0.0.22"
duckdb-engine = ">=0.13.5"
exchangelib = ">=5.5.0"
llama-index = ">=0.12.1"
imapclient = ">=3.0.1"
llama-cpp-python = ">=0.3.2"
llama-index-vector-stores-chroma = ">=0.4.0"
llama-index-embeddings-huggingface = ">=0.4.0"
llama-index-readers-database = ">=0.3.0"

[feature.dev.dependencies]
pytest = ">=8.3.3"
pytest-mock = ">=3.14.0"
ruff = ">=0.8.4"
mypy = ">=1.13.0"
vulture = ">=2.11"
bandit = ">=1.7.9"
types-requests = ">=2.32.0.20241016"

[environments]
default = ["dev"]
