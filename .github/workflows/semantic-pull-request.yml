name: Semantic Pull Request

on:
  pull_request_target:
    # The types of events that trigger the workflow.
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const types = ['fix', 'feat', 'docs', 'style', 'refactor', 'perf', 'test', 'chore', 'ci', 'build'];
            // Matches: [WIP: ]type[(scope)][!]: subject
            const pattern = new RegExp(
              '^(WIP: )?(' + types.join('|') + ')(\\(.+\\))?!?: .+'
            );

            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" does not match the conventional commit format.\n` +
                `Expected: <type>: <subject> or <type>(<scope>): <subject>\n` +
                `Valid types: ${types.join(', ')}\n` +
                `WIP prefix is also allowed: WIP: <type>: <subject>`
              );
            } else {
              console.log(`PR title "${title}" is valid.`);
            }